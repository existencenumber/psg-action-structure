name: Verify Physical Constants

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install mpmath

    - name: Verify all constants
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        import mpmath as mp
        mp.mp.dps = 100
        
        from constants import init_constants
        from transfer_matrix import build_T
        
        pi, e, tau, gamma, alpha0, eps0 = init_constants()
        
        # Solve alpha
        alpha = mp.mpf(1)/137
        for _ in range(25):
            T = build_T(alpha, eps0)
            inv = (mp.eye(9) - T) ** (-1)
            Z_M = inv[1,1]
            alpha_new = alpha0 / (abs(Z_M) ** 2)
            if abs(alpha_new - alpha) < mp.mpf('1e-30'):
                break
            alpha = alpha_new
        
        alpha_inv = 1/alpha
        print(f'alpha^(-1) = {float(alpha_inv):.12f}')
        
        # Verify
        expected = 137.035999084
        assert abs(float(alpha_inv) - expected) < 1e-8, f'FAIL: alpha^(-1)={float(alpha_inv)}'
        print('All verifications passed.')
        "
